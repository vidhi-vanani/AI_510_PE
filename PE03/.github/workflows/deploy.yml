name: CI CD workflow

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Set up job
      run: echo "Starting pipeline..."

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Train Model
      run: |
        python train_model.py

    - name: Run Flask App & Test
      run: |
        python app.py &
        sleep 5

    - name: Validate Model Output
      run: |
        response=$(curl -s -X POST http://localhost:5000/predict \
        -H "Content-Type: application/json" \
        -d '{"features": [6.7, 3.1, 4.4, 1.4]}')

        echo "Response: $response"

        if [[ $response == *"prediction"* ]]; then
          echo "Model prediction check passed."
        else
          echo "Model prediction failed."
          exit 1
        fi

    - name: Complete job
      run: echo "Pipeline completed successfully!"