name: CI CD workflow

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Set up job
      run: echo "Starting pipeline..."

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install Dependencies
      run: |
        pip install -r PE03/requirements.txt

    - name: Train Model
      run: |
        python PE03/train_model.py

    - name: Run Flask App & Test
      run: |
        python PE03/app.py &
        sleep 5

    - name: Validate Model Output
      run: |
        curl -X POST http://localhost:5000/predict \
          -H "Content-Type: application/json" \
          -d '{"features": [5.1, 3.5, 1.4, 0.2]}'

        echo "Response: $response"

        if [[ $response == *"prediction"* ]]; then
          echo "Model prediction check passed."
        else
          echo "Model prediction failed."
          exit 1
        fi

    - name: Complete job
      run: echo "Pipeline completed successfully!"